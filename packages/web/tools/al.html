<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AL解密工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .box {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }
        textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px;
            color: #0f0;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
            box-sizing: border-box;
        }
        textarea:focus {
            border-color: #007aff;
        }
        .output {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px;
            margin-top: 16px;
            color: #0f0;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            word-break: break-all;
            white-space: pre-wrap;
        }
        .error {
            color: #ff4444;
        }
        .btn {
            background: #007aff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        .btn:active {
            opacity: 0.7;
        }
        .footer {
            color: #666;
            font-size: 11px;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>🔓 AL 解密工具</h1>
    <textarea id="input" rows="4" placeholder="粘贴 encrypted_data 值或完整JSON"></textarea>
    <div class="btn" id="decryptBtn">解密</div>
    <div class="output" id="output"></div>
    <div class="footer">密钥: z5916383ef21f0649b0957249</div>
</div>

<script>
const KEY = "z5916383ef21f0649b0957249";

function rc4(data, key) {
    let s = [];
    for (let i = 0; i < 256; i++) s[i] = i;
    let j = 0;
    for (let i = 0; i < 256; i++) {
        j = (j + s[i] + key.charCodeAt(i % key.length)) % 256;
        [s[i], s[j]] = [s[j], s[i]];
    }
    let i = 0;
    j = 0;
    let out = [];
    for (let k = 0; k < data.length; k++) {
        i = (i + 1) % 256;
        j = (j + s[i]) % 256;
        [s[i], s[j]] = [s[j], s[i]];
        out.push(data[k] ^ s[(s[i] + s[j]) % 256]);
    }
    return out;
}

function base64Decode(str) {
    try {
        return atob(str);
    } catch(e) {
        return null;
    }
}

function hexToBytes(hex) {
    let bytes = [];
    for (let i = 0; i < hex.length; i += 2) {
        bytes.push(parseInt(hex.substr(i, 2), 16));
    }
    return bytes;
}

function decrypt(b64) {
    let binary = base64Decode(b64);
    if (!binary) return null;
    
    let bytes = [];
    for (let i = 0; i < binary.length; i++) {
        bytes.push(binary.charCodeAt(i));
    }
    
    let hexStr = "";
    for (let i = 0; i < bytes.length; i++) {
        hexStr += bytes[i].toString(16).padStart(2, '0');
    }
    
    let encrypted = hexToBytes(hexStr);
    let decrypted = rc4(encrypted, KEY);
    
    let result = "";
    for (let i = 0; i < decrypted.length; i++) {
        result += String.fromCharCode(decrypted[i]);
    }
    
    return JSON.parse(result);
}

document.getElementById('decryptBtn').onclick = function() {
    let input = document.getElementById('input').value.trim();
    let output = document.getElementById('output');
    
    if (!input) {
        output.innerHTML = '请输入数据';
        output.classList.add('error');
        return;
    }
    
    // 提取 encrypted_data 的值
    let match = input.match(/"encrypted_data"\s*:\s*"([^"]+)"/);
    let b64 = match ? match[1] : input;
    
    try {
        let result = decrypt(b64);
        output.innerHTML = JSON.stringify(result, null, 2);
        output.classList.remove('error');
    } catch(e) {
        output.innerHTML = '解密失败: ' + e.message;
        output.classList.add('error');
    }
};
</script>
</body>
</html>
